<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Live Widescreen Scoreboard – Sports Day</title>
  <meta name="description" content="Cinematic live house standings for Sports Day TV"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#f59e0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Sports Day"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    :root {
      --gold: #FFD700;
      --accent: hsl(35,90%,55%);
      --bg: hsl(220,15%,6%);
      --text: hsl(220,20%,92%);
      --text-muted: hsl(220,10%,55%);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden !important;
      background-color: #000;
      background-size: cover;
      background-position: center;
      color: white;
      user-select: none;
    }
    
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1;
      pointer-events: none;
    }

    /* STARTER SPLASH SCREEN */
    #starter {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #040201;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      text-align: center;
    }
    #starter h1 {
      color: var(--gold);
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      margin: 0;
      text-shadow: 0 0 30px rgba(255,215,0,0.4);
      letter-spacing: 4px;
    }
    #starter p {
      font-size: 1.4rem;
      margin-top: 20px;
      letter-spacing: 2px;
      color: #fff;
      font-weight: 700;
      animation: pulseText 1.5s infinite alternate;
    }
    @keyframes pulseText {
      from { opacity: 0.5; } to { opacity: 1; text-shadow: 0 0 10px #fff; }
    }

    /* MAIN CONTAINER */
    .container {
      position: relative;
      z-index: 10;
      padding: 14px 20px 8px;
      height: 100vh;
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(255,215,0,0.15);
      padding-bottom: 8px;
    }
    .logo-img {
      height: 75px;
      width: auto;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      margin-left: 10px;
      display: none;
    }
    .founder-img {
      height: 75px;
      width: 75px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      box-shadow: 0 4px 15px rgba(0,0,0,0.8);
      object-fit: cover;
      margin-right: 10px;
      display: none;
    }

    /* SLIDE STAGE */
    .slide-stage {
      position: relative;
      flex-grow: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0; /* Important for flex-grow in height-constrained containers */
    }

    /* Slide transition animations */
    .slide {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: scale(0.97) translateY(12px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
      width: 100%;
      height: 100%;
    }
    .slide.active {
      display: flex;
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    .slide.exiting {
      opacity: 0;
      transform: scale(1.02) translateY(-10px);
      transition: opacity 0.55s ease-in, transform 0.55s ease-in;
    }

    /* Floating Header Pill Label */
    #slide-flash {
      position: fixed;
      top: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(-15px);
      background: rgba(0,0,0,0.85);
      border: 1.5px solid rgba(255,215,0,0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 6px 25px;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #FFD700;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s, transform 0.35s;
    }
    #slide-flash.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Ticker Footer */
    .footer-bar {
      flex-shrink: 0;
      background: rgba(0,0,0,0.7);
      padding: 8px 20px;
      border-radius: 50px;
      text-align: center;
      font-weight: bold;
      border: 1px solid var(--gold);
      margin-top: 6px;
      font-size: 0.82rem;
      letter-spacing: 1px;
    }

    /* BROADCAST LIVE BADGE */
    #live-badge {
      position: fixed;
      top: 105px;
      right: 30px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.65);
      padding: 5px 12px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 900;
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: #fff;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .live-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ff3333;
      box-shadow: 0 0 8px #ff3333;
      animation: pulseRed 1.5s infinite;
    }
    @keyframes pulseRed {
      0% { opacity: 0.4; box-shadow: 0 0 0px #ff3333; }
      50% { opacity: 1; box-shadow: 0 0 10px #ff3333; }
      100% { opacity: 0.4; box-shadow: 0 0 0px #ff3333; }
    }

    /* FLOAT UP EMBERS */
    #embers {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .ember {
      position: absolute;
      bottom: -15px;
      width: 3.5px;
      height: 3.5px;
      border-radius: 50%;
      background: #FFD700;
      box-shadow: 0 0 10px 2px #FF8C00;
      animation: floatUp var(--dur) ease-in infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-110vh) scale(0.2) translateX(var(--drift)); opacity: 0; }
    }

    /* HARRY POTTER HANGING SHIELDS STYLE */
    .banner-slide {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      justify-content: flex-start;
      padding-top: 4px;
    }
    .slide-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.8vw, 4.2rem);
      font-weight: 900;
      margin: 0 0 8px 0;
      text-shadow: 0 0 35px rgba(180,130,0,0.85), 0 4px 15px rgba(0,0,0,1);
      letter-spacing: 4px;
      color: #fff;
    }
    .slide-title span { color: var(--gold); }
    
    /* WEEKLY BLUE THEME */
    .banner-slide-weekly .slide-title {
      color: #00e8ff;
      text-shadow: 0 0 25px rgba(0,210,255,0.9), 0 4px 15px rgba(0,0,0,1);
    }
    .banner-slide-weekly .shield-wrap {
      filter: drop-shadow(0 18px 25px rgba(0,0,0,0.95)) drop-shadow(0 0 15px rgba(0,190,255,0.4));
    }
    .banner-slide-weekly .shield::after { border-color: rgba(0,210,255,0.7) !important; }
    .banner-slide-weekly .rank-1 .shield::after {
      border-color: rgba(0,230,255,1) !important;
      border-width: 3.5px !important;
      animation: cyanPulse 2s ease-in-out infinite alternate;
    }
    .banner-slide-weekly .banner-score, .banner-slide-weekly .rank-1 .banner-score {
      color: #00eeff;
      text-shadow: 0 0 15px rgba(0,210,255,0.8);
    }
    .banner-slide-weekly .chain {
      background: repeating-linear-gradient(to bottom,#00607a 0px,#00d4ff 4px,#00a8c8 6px,#003d50 10px,transparent 10px,transparent 14px);
    }
    @keyframes cyanPulse {
      0% { box-shadow: inset 0 0 8px rgba(0,200,255,0.3); }
      100% { box-shadow: inset 0 0 25px rgba(0,200,255,0.6); }
    }

    /* ANNUAL GOLD THEME */
    .banner-slide-annual .slide-title {
      color: #FFD700;
      text-shadow: 0 0 35px rgba(255,160,0,0.9), 0 4px 15px rgba(0,0,0,1);
    }
    .banner-slide-annual .rank-1 .shield::after {
      animation: goldPulse 2.5s ease-in-out infinite alternate;
    }
    @keyframes goldPulse {
      0% { border-color: rgba(255,215,0,0.65); }
      100% { border-color: rgba(255,215,0,1); box-shadow: 0 0 18px rgba(255,215,0,0.35); }
    }

    .banners-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      width: 100%;
      flex: 1;
      padding: 0 14px;
      align-self: stretch;
      min-height: 0;
    }

    /* Suspended sway physics animation */
    .bw {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      max-width: 220px;
      padding-bottom: 55px;
      transform-origin: top center;
    }
    .bw:nth-child(1) { animation: bannerDrop 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both 0.0s, sway 5s ease-in-out infinite alternate 1.2s; }
    .bw:nth-child(2) { animation: bannerDrop 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both 0.2s, sway 5s ease-in-out infinite alternate 1.4s; }
    .bw:nth-child(3) { animation: bannerDrop 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both 0.4s, sway 5s ease-in-out infinite alternate 1.6s; }
    .bw:nth-child(4) { animation: bannerDrop 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both 0.6s, sway 5s ease-in-out infinite alternate 1.8s; }
    
    @keyframes sway {
      0% { transform: rotate(-2deg) translateX(-2px); }
      100% { transform: rotate(2deg) translateX(2px); }
    }
    @keyframes bannerDrop {
      0% { transform: scaleY(0.1) translateY(-100px); opacity: 0; }
      100% { transform: scaleY(1) translateY(0); opacity: 1; }
    }

    .chain-wrap {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding-top: 0;
      position: relative;
      z-index: 2;
      height: 90px;
      flex-shrink: 0;
    }
    .bw.rank-1 .chain-wrap { height: 16px; }
    .bw.rank-2 .chain-wrap { height: 32px; }
    .bw.rank-3 .chain-wrap { height: 50px; }
    .bw.rank-4 .chain-wrap { height: 68px; }

    .bw.rank-1 { max-width: clamp(230px, 21vw, 350px); }
    .bw.rank-2 { max-width: clamp(195px, 18vw, 290px); }
    .bw.rank-3 { max-width: clamp(180px, 16vw, 260px); }
    .bw.rank-4 { max-width: clamp(165px, 14vw, 235px); }

    .bw.rank-1 .shield, .bw.rank-1 .shield-wrap { min-height: clamp(290px, 42vh, 480px); }
    .bw.rank-2 .shield, .bw.rank-2 .shield-wrap { min-height: clamp(245px, 35vh, 400px); }
    .bw.rank-3 .shield, .bw.rank-3 .shield-wrap { min-height: clamp(215px, 30vh, 350px); }
    .bw.rank-4 .shield, .bw.rank-4 .shield-wrap { min-height: clamp(190px, 26vh, 300px); }

    .bw.rank-2 .rank-num { font-size: clamp(3rem, 4vw, 5rem); }
    .bw.rank-3 .rank-num { font-size: clamp(2.6rem, 3.4vw, 4.4rem); }
    .bw.rank-4 .rank-num { font-size: clamp(2.3rem, 3vw, 3.8rem); }
    .bw.rank-2 .banner-name { font-size: clamp(1.1rem, 1.5vw, 1.8rem); }
    .bw.rank-3 .banner-name { font-size: clamp(1rem, 1.3vw, 1.6rem); }
    .bw.rank-4 .banner-name { font-size: clamp(0.9rem, 1.1vw, 1.4rem); }
    .bw.rank-2 .banner-score { font-size: clamp(1.6rem, 2.4vw, 3.1rem); }
    .bw.rank-3 .banner-score { font-size: clamp(1.4rem, 2.1vw, 2.7rem); }
    .bw.rank-4 .banner-score { font-size: clamp(1.3rem, 1.8vw, 2.4rem); }

    .chain {
      width: 7.5px;
      background: repeating-linear-gradient(to bottom, #b8860b 0px, #ffd700 4px, #f5c518 6px, #8b6508 10px, transparent 10px, transparent 14px);
      border-radius: 3px;
      filter: drop-shadow(0 0 3px rgba(200,160,0,0.6));
    }
    
    .banner-gap {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(0.8rem, 1.3vh, 1.2rem);
      font-weight: 900;
      letter-spacing: 1px;
      color: #fff;
      text-transform: uppercase;
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      text-align: center;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      opacity: 0.8;
      z-index: 10;
    }
    .banner-gap.leader { color: #FFD700; opacity: 1; text-shadow: 0 0 10px rgba(255,215,0,0.6); }

    .banner-rod {
      position: relative;
      z-index: 5;
      width: calc(100% + 14px);
      height: 16px;
      border-radius: 9px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.9), inset 0 2px 4px rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .banner-rod::before, .banner-rod::after {
      content: ''; position: absolute; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; border-radius: 50%;
      background: inherit;
      box-shadow: 0 3px 8px rgba(0,0,0,0.8), inset 0 2px 4px rgba(255,255,255,0.4);
    }
    .banner-rod::before { left: -7px; }
    .banner-rod::after { right: -7px; }
    
    .rank-1 .banner-rod { background: linear-gradient(180deg,#fffaaa 0%,#f0c000 40%,#8b6508 100%); }
    .rank-2 .banner-rod { background: linear-gradient(180deg,#ffffff 0%,#c8c8c8 40%,#666 100%); }
    .rank-3 .banner-rod { background: linear-gradient(180deg,#f5c580 0%,#c07830 40%,#5a2d00 100%); }
    .rank-4 .banner-rod { background: linear-gradient(180deg,#888 0%,#444 40%,#111 100%); }

    .floating-crown {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.2rem;
      z-index: 20;
      animation: crownBob 2s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 15px rgba(255,215,0,0.8));
    }
    @keyframes crownBob {
      0% { transform: translateX(-50%) translateY(0) scale(1) rotate(0deg); }
      100% { transform: translateX(-50%) translateY(-8px) scale(1.08) rotate(2deg); filter: drop-shadow(0 0 20px #FFD700); }
    }

    .shield {
      position: relative;
      width: 100%;
      clip-path: polygon(8% 0%, 92% 0%, 100% 6%, 100% 74%, 50% 100%, 0% 74%, 0% 6%);
      -webkit-clip-path: polygon(8% 0%, 92% 0%, 100% 6%, 100% 74%, 50% 100%, 0% 74%, 0% 6%);
      flex: 1;
      min-height: 290px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 18px 10px 45px;
      overflow: hidden;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
    }
    .shield-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 290px;
      filter: drop-shadow(0 18px 25px rgba(0,0,0,0.98)) drop-shadow(0 0 10px rgba(180,140,0,0.45));
    }

    .shield::before {
      content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      clip-path: inherit;
      background:
        linear-gradient(96deg,
          rgba(0,0,0,0.7) 0%,
          rgba(255,255,255,0.08) 18%,
          rgba(0,0,0,0.35) 38%,
          rgba(255,255,255,0.12) 58%,
          rgba(0,0,0,0.55) 78%,
          rgba(255,255,255,0.06) 90%,
          rgba(0,0,0,0.7) 100%
        ),
        linear-gradient(180deg,
          rgba(255,255,255,0.18) 0%,
          rgba(0,0,0,0.0) 40%,
          rgba(0,0,0,0.75) 100%
        );
    }
    .shield::after {
      content: ''; position: absolute; z-index: 1; pointer-events: none;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 2.2px solid rgba(255,215,0,0.5);
      clip-path: polygon(8% 0%, 92% 0%, 100% 6%, 100% 74%, 50% 100%, 0% 74%, 0% 6%);
    }
    .rank-1 .shield::after { border-color: rgba(255,215,0,0.85); border-width: 2.8px; }

    /* Shimmer Glareshield Effect */
    .shield-glare {
      content: ''; position: absolute; top: 0; left: -180%; width: 80%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg);
      animation: sweepGlare 7s ease-in-out infinite;
      z-index: 10; pointer-events: none;
    }
    @keyframes sweepGlare {
      0%, 60% { left: -180%; }
      100% { left: 250%; }
    }

    .banner-rank {
      display: flex;
      align-items: flex-start;
      font-family: 'Playfair Display', serif;
      color: #fff;
      z-index: 2;
      position: relative;
      margin-bottom: 2px;
    }
    .rank-num {
      font-size: clamp(3.5rem, 6.8vh, 6.8rem);
      font-weight: 900;
      line-height: 0.9;
      text-shadow: 1px 1px 0 #8b6508, 2px 2px 0 #7a5500, 3px 3px 0 #5c3d00, 4px 4px 6px rgba(0,0,0,0.8), 0 0 18px rgba(255,200,0,0.35);
    }
    .rank-1 .rank-num {
      font-size: clamp(5rem, 9.5vh, 10rem);
      color: #FFD700;
      text-shadow: 1px 1px 0 #b8860b, 2px 2px 0 #996600, 3px 3px 0 #7a5000, 4px 4px 0 #5c3a00, 5px 5px 8px rgba(0,0,0,0.9), 0 0 35px rgba(255,220,0,0.65);
    }
    .rank-ord {
      font-size: clamp(1.1rem, 2vh, 2rem);
      font-weight: 900;
      margin-top: 5px;
      margin-left: 2px;
      text-transform: uppercase;
      text-shadow: 1px 1px 3px #000;
    }
    .rank-1 .rank-ord { font-size: clamp(1.5rem, 2.8vh, 2.7rem); color: #FFD700; }

    .banner-name {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(1.2rem, 2.3vh, 2.2rem);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 0 #000, 0 4px 8px rgba(0,0,0,0.9);
      text-align: center;
      z-index: 2;
      position: relative;
      margin-top: 2px;
    }
    .rank-1 .banner-name { font-size: clamp(1.6rem, 3.2vh, 3rem); }

    .banner-score {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 4.2vh, 3.7rem);
      color: #FFD700;
      z-index: 2;
      position: relative;
      margin-top: 3px;
      line-height: 1;
      text-shadow: 0 1px 0 #b8860b, 0 2px 0 #996600, 0 3px 0 #7a5000, 0 4px 7px rgba(0,0,0,0.9), 0 0 18px rgba(255,200,0,0.25);
    }
    .rank-1 .banner-score { font-size: clamp(2.8rem, 6.2vh, 5.5rem); }

    .banner-pts-label {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(0.7rem, 1.3vh, 1rem);
      font-weight: 700;
      color: rgba(255,215,0,0.65);
      letter-spacing: 1.8px;
      text-transform: uppercase;
      z-index: 2;
      position: relative;
    }

    .banner-logo {
      width: clamp(75px, 12vh, 120px);
      height: clamp(75px, 12vh, 120px);
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%,#2a2a2a,#0a0a0a);
      border: 2.5px solid rgba(255,215,0,0.7);
      box-shadow: 0 5px 16px rgba(0,0,0,0.92), 0 0 12px rgba(180,140,0,0.4), inset 0 0 8px rgba(0,0,0,0.7);
      overflow: hidden;
      z-index: 2;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 2.8vw, 3.2rem);
      font-weight: 900;
      color: rgba(255,215,0,0.8);
      margin: 6px auto 5px;
      flex-shrink: 0;
    }
    .banner-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .rank-1 .banner-logo {
      width: clamp(100px, 11vw, 150px);
      height: clamp(100px, 11vw, 150px);
      border-width: 3.5px;
      border-color: #FFD700;

    .ach-photo-panel > img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .ach-photo-fade {

    /* TOP ACTIVE DEPT & STAR PERFORMERS SLIDE */

    .t-bronze { background: radial-gradient(circle at 35% 35%,#f5c580,#cd7f32,#5a2d00); color: #fff; }

    .teacher-name {

    /* AWPOINT WINNER CINEMATIC POPUP CARD */
    #paper-popup {

      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;

    #pop-pts {

    @keyframes ptsPulse {
      0% { text-shadow: 0 0 10px rgba(255,215,0,0.5); transform: scale(1); }

    #pop-character {
      position: absolute; top: -130px; right: -90px;

    #pop-house {

      box-shadow: 0 4px 10px rgba(0,0,0,0.6);

    #vol-btn {
      position: fixed; bottom: 20px; left: 20px; z-index: 1001;

  </style>

<body>
  
  <!-- STARTER SPLASH OVERLAY (AUTOPLAY WORKAROUND) -->
  <div id="starter" onclick="begin()">
    <h1 id="starter-college">🏆 SPORTS DAY</h1>
    <p>🚀 CLICK TO LAUNCH LIVE STAGE 🎵</p>
  </div>

  <!-- FLOATING CURRENT SLIDE BANNER PILL -->
  <div id="slide-flash"></div>

  <!-- AMBIENT EFFECT CONTAINER -->
  <div id="embers"></div>
  <div id="live-badge"><div class="live-dot"></div> LIVE</div>
  <div class="overlay"></div>

  <!-- AUDIO SOURCES -->
  <audio id="bgMusic" loop preload="auto"></audio>
  <audio id="sfx-chime" src="https://upload.wikimedia.org/wikipedia/commons/f/f6/Glissando_Chimes_Sound_Effect.ogg" preload="auto"></audio>

  <!-- MAIN VIEWPORT LAYOUT -->
  <div class="container">
    <div class="header">
      <img id="disp-logo" class="logo-img" alt="Logo">
      <h1 id="disp-title" style="font-size: 1.8rem; font-weight: 900; margin: 0; text-shadow: 0 3px 8px #000; font-family:'Playfair Display', serif;">
        SPORTS <span style="color:var(--gold)">SCOREBOARD</span>
      </h1>
      <img id="disp-founder" class="founder-img" alt="Founder">
    </div>

    <!-- CAROUSEL TRANSITION STAGE -->
    <div class="slide-stage" id="slide-stage"></div>

    <!-- FOOTER TICKER -->
    <div class="footer-bar" id="ticker">CONNECTING TO DATABASE...</div>
  </div>

  <!-- AWARD CELEBRATION POPUP CARD -->
  <div id="paper-popup">
    <img id="pop-character" src="https://media.tenor.com/bCbp9zIMcwYAAAAi/confetti-minion.gif" alt="Celebration Character">
    <div style="font-size: 1.1rem; font-weight: 700; color: #FFD700; letter-spacing: 2px;">🎉 CONGRATULATIONS 🎉</div>
    <div id="pop-name">...</div>
    <div id="pop-dept" style="font-size: 1.2rem; font-weight: 700; color: rgba(255,255,255,0.75);">...</div>
    <div id="pop-pts">0</div>
    <div id="pop-house">HOUSE</div>
  </div>

  <!-- MUTE SWITCH BUTTON -->
  <div id="vol-btn" onclick="toggleMute()">🔇</div>

  <script src="api.js"></script>
  <script>
    // ─────────────────────────────────────────────
    //  GLOBAL STATE
    // ─────────────────────────────────────────────
    let lastGlobalPoints = 0;
    let currentSlideIndex = 0;
    let slidesData = [];
    let isPopupActive = false;
    let volumeMuted = true;
    let results = [];
    let scores = [];
    let houses = [];
    let settings = {};

    // ─────────────────────────────────────────────
    //  Google Drive Helpers
    // ─────────────────────────────────────────────
    function getGoogleDriveStreamUrl(url) {
      if (!url) return '';
      const dRegex = /\/d\/([a-zA-Z0-9_-]+)/;
      const dMatch = url.match(dRegex);
      if (dMatch && dMatch[1]) {
        return `https://drive.google.com/uc?export=download&id=${dMatch[1]}`;
      }
      const idRegex = /[?&]id=([a-zA-Z0-9_-]+)/;
      const idMatch = url.match(idRegex);
      if (idMatch && idMatch[1]) {
        return `https://drive.google.com/uc?export=download&id=${idMatch[1]}`;
      }
      return url;
    }

    function getGoogleDriveFileId(url) {
      if (!url) return '';
      const dRegex = /\/d\/([a-zA-Z0-9_-]+)/;
      const dMatch = url.match(dRegex);
      if (dMatch && dMatch[1]) return dMatch[1];
      const idRegex = /[?&]id=([a-zA-Z0-9_-]+)/;
      const idMatch = url.match(idRegex);
      if (idMatch && idMatch[1]) return idMatch[1];
      return '';
    }

    // ─────────────────────────────────────────────
    //  Aesthetics & Helpers
    // ─────────────────────────────────────────────
    function achIcon(title) {
      const t = String(title || '').toLowerCase();
      if (/cod|tech|program|hack|software|comput/.test(t)) return '💻';
      if (/sport|athlet|cricket|football|basket|swim|run|game|relay|race|shotput|jump/.test(t)) return '🏆';
      if (/lead|captain|head|prefect|president/.test(t)) return '👑';
      if (/academ|topper|rank|scholar|exam|study/.test(t)) return '📚';
      if (/art|draw|paint|design|craft/.test(t)) return '🎨';
      if (/music|sing|choir|instrument|band/.test(t)) return '🎵';
      if (/scien|lab|research|bio|chem|phy/.test(t)) return '🔬';
      if (/math|calc|stats/.test(t)) return '📐';
      return '🏅';
    }

    function houseColor(name) {
      const h = houses.find(x => String(x.HouseName || '').trim().toLowerCase() === String(name || '').trim().toLowerCase());
      return h ? (h.Color || '#888') : '#888';
    }

    function hv(name) {
      return '--h-' + String(name || '').toLowerCase().replace(/\s+/g, '-');
    }

    function tryHexToRgb(hex) {
      try {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `${r},${g},${b}`;
      } catch(e){ return '128,128,128'; }
    }

    function getBlob(b64, type) {
      try {
        const bin = atob(b64.split(',')[1]);
        const arr = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        return URL.createObjectURL(new Blob([arr], { type: type }));
      } catch (err) { return null; }
    }

    // ─────────────────────────────────────────────
    //  Launch & Setup
    // ─────────────────────────────────────────────
    function begin() {
      document.getElementById('starter').style.display = 'none';
      const m = document.getElementById('bgMusic');
      m.muted = false;
      m.volume = 0.65;
      volumeMuted = false;
      document.getElementById('vol-btn').textContent = '🔊';

      const ticker = document.getElementById('ticker');
      
      // Auto-trigger background music play
      function playAudio(retries = 0) {
        m.play().then(() => {
          ticker.innerText = 'Syncing... Loading scores...';
        }).catch(e => {
          if (retries < 6) {
            ticker.innerText = `Connecting audio stage (${retries + 1})...`;
            setTimeout(() => playAudio(retries + 1), 1200);
          } else {
            console.warn('Google Drive audio stream block. Retrying default track...');
            m.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3';
            m.load(); m.play().catch(() => {});
          }
        });
      }
      playAudio();

      // Launch floating embers
      const emb = document.getElementById('embers');
      for (let i = 0; i < 30; i++) {
        const d = document.createElement('div');
        d.className = 'ember';
        d.style.left = Math.random() * 100 + '%';
        d.style.setProperty('--dur', (Math.random() * 6 + 4) + 's');
        d.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
        d.style.animationDelay = (Math.random() * 8) + 's';
        emb.appendChild(d);
      }

      startRotation();
    }

    function toggleMute() {
      const m = document.getElementById('bgMusic');
      m.muted = !m.muted;
      volumeMuted = m.muted;
      document.getElementById('vol-btn').textContent = m.muted ? '🔇' : '🔊';
      if (!m.muted && m.paused) m.play();
    }

    // ─────────────────────────────────────────────
    //  Slide Generation (adapted dynamically)
    // ─────────────────────────────────────────────
    function flagSlide(housePairs, label, mode) {
      if (!housePairs || housePairs.length === 0) return '';
      const themeClass = (mode === 'weekly') ? 'banner-slide-weekly' : 'banner-slide-annual';
      const leaderScore = housePairs.length > 0 ? housePairs[0][1] : 0;
      
      let html = `<div class="banner-slide ${themeClass}">`;
      html += `<h2 class="slide-title">${label}</h2>`;
      html += `<div class="banners-row">`;
      
      housePairs.forEach((pair, idx) => {
        const name = pair[0];
        const score = pair[1];
        const rank = idx + 1;
        const isFirst = (rank === 1);
        const col = houseColor(name);
        
        // Render logo
        const h = houses.find(x => x.HouseName === name);
        const logoUrl = h && h.LogoUrl ? getGoogleDriveThumbUrl(h.LogoUrl) : '';
        const logoInner = logoUrl
          ? `<img src="${logoUrl}" onerror="this.parentElement.innerHTML='<span>${name.charAt(0)}</span>'">`
          : `<span>${name.charAt(0)}</span>`;
          
        const chains = `<div class="chain-wrap"><div class="chain"></div><div class="chain"></div></div>`;
        const gapHtml = isFirst
          ? `<div class="banner-gap leader">👑 LEADER</div>`
          : `<div class="banner-gap">▼ ${leaderScore - score} pts behind</div>`;
          
        html += `
          <div class="bw rank-${rank}">
            ${isFirst ? '<div class="floating-crown">👑</div>' : ''}
            ${chains}
            <div class="banner-rod"></div>
            <div class="shield-wrap">
              <div class="shield" style="background-color:var(${hv(name)})">
                <div class="shield-glare"></div>
                <div class="banner-rank">
                  <span class="rank-num">${rank}</span>
                  <span class="rank-ord">${rank === 1 ? 'ST' : rank === 2 ? 'ND' : rank === 3 ? 'RD' : 'TH'}</span>
                </div>
                <div class="banner-name">${name.toUpperCase()}</div>
                <div class="banner-logo">${logoInner}</div>
                <div class="banner-score count-up" data-val="${score}">0</div>
                <div class="banner-pts-label">POINTS</div>
              </div>
            </div>
            ${gapHtml}
          </div>`;
      });
      
      html += `</div></div>`;
      return html;
    }

    function buildEventHouseSlide(eventName, houseScoreMap, mode) {
      const themeClass = 'dhs-annual';
      const modeLabel = '🏆 OVERALL';
      const modeColor = '#FFD700';

      const sorted = houses.map(h => [h.HouseName, houseScoreMap[h.HouseName] || 0])
                           .sort((a,b) => b[1] - a[1]);

      const maxPts = sorted.reduce((m,h) => Math.max(m, h[1]), 1);
      const rankIcons = ['🥇','🥈','🥉','🏅'];
      const BAR_MAX_VH = 32; // tallest bar is capped

      const cols = sorted.map((h, idx) => {
        const hName = h[0];
        const hPts = h[1];
        const hColor = houseColor(hName);
        
        const hs = houses.find(x => x.HouseName === hName);
        const logoUrl = hs && hs.LogoUrl ? getGoogleDriveThumbUrl(hs.LogoUrl) : '';
        const logoInner = logoUrl
          ? `<img src="${logoUrl}" onerror="this.style.display='none';this.nextSibling.style.display='flex';"><span class="dh-logo-fallback" style="display:none;">${hName.charAt(0).toUpperCase()}</span>`
          : `<span class="dh-logo-fallback">${hName.charAt(0).toUpperCase()}</span>`;

        const barH = hPts > 0 ? Math.max(2, Math.round((hPts / maxPts) * BAR_MAX_VH)) : 0;
        const isTop = (idx === 0 && hPts > 0);
        const scoreEl = hPts > 0
          ? `<div class="dh-score count-up" data-val="${hPts}">0</div>`
          : `<div class="dh-nopts">&mdash;</div>`;

        const darken = (hex) => {
          try {
            const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
            return `rgb(${Math.max(0,r-55)},${Math.max(0,g-55)},${Math.max(0,b-55)})`;
          } catch(e){ return hex; }
        };
        const lighten = (hex) => {
          try {
            const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
            return `rgb(${Math.min(255,r+65)},${Math.min(255,g+65)},${Math.min(255,b+65)})`;
          } catch(e){ return hex; }
        };

        return `
          <div class="dh-house-col ${isTop ? 'dh-top' : ''}" style="--hc:${hColor};">
            ${isTop ? '<div class="dh-crown">👑</div>' : '<div class="dh-spacer"></div>'}
            ${scoreEl}
            <div class="dh-logo-badge" style="--hc:${hColor};">
              ${logoInner}
            </div>
            ${hPts > 0
              ? `<div class="dh-bar" style="height:${barH}vh; background:linear-gradient(to top,${darken(hColor)} 0%,${hColor} 55%,${lighten(hColor)} 100%);">
                   <div class="dh-bar-rank">${rankIcons[idx]||''}</div>
                 </div>`
              : '<div style="height:18px;"></div>'}
            <div class="dh-base-line"></div>
            <div class="dh-flag-wrap">
              <div class="dh-flagpole">
                <div class="dh-flag" style="--hc:${hColor};">${hName.charAt(0).toUpperCase()}</div>
              </div>
            </div>
            <div class="dh-house-label" style="color:${hColor};">${hName.toUpperCase()}</div>
          </div>`;
      }).join('');

      return `
        <div class="dept-house-slide ${themeClass}">
          <div class="dh-header-bar">
            <div class="dh-dept-title">🎽 <em style="color:${modeColor};">${eventName}</em></div>
            <div class="dh-mode-badge"><div class="dh-mode-dot"></div>${modeLabel}</div>
          </div>
          <div class="dh-dept-sub">House Standings</div>
          <div class="dh-chart-outer">${cols}</div>
        </div>`;
    }

    // ─────────────────────────────────────────────
    //  Data calculations & bindings
    // ─────────────────────────────────────────────
    async function updateData() {
      try {
        const scoreboardData = await apiGet('getScoreboard');
        scores = scoreboardData.scores || [];
        houses = scoreboardData.houses || [];
        settings = scoreboardData.settings || {};
        
        // Fetch raw results list
        results = await apiGet('getResults');
        
        // Bind settings and logos in header
        if (settings.CollegeName && settings.EventTitle) {
          document.getElementById('disp-title').innerHTML = `${settings.CollegeName.toUpperCase()} <span style="color:var(--gold)">${settings.EventTitle.toUpperCase()}</span>`;
          document.getElementById('starter-college').textContent = settings.CollegeName.toUpperCase();
        }
        if (settings.LogoUrl) {
          const lImg = document.getElementById('disp-logo');
          lImg.src = getGoogleDriveThumbUrl(settings.LogoUrl);
          lImg.style.display = 'block';
        }
        if (settings.FounderUrl) {
          const fImg = document.getElementById('disp-founder');
          fImg.src = getGoogleDriveThumbUrl(settings.FounderUrl);
          fImg.style.display = 'block';
        }

        // Auto play / update music source
        const bgM = document.getElementById('bgMusic');
        if (settings.MusicUrl) {
          const streamUrl = getGoogleDriveStreamUrl(settings.MusicUrl);
          if (bgM.src !== streamUrl) {
            bgM.src = streamUrl;
            bgM.load();
            if (!volumeMuted) bgM.play().catch(() => {});
          }
        }

        // Calculate and inject house color custom CSS properties dynamically
        let sc = document.getElementById('dyn-css');
        if (!sc) {
          sc = document.createElement('style');
          sc.id = 'dyn-css';
          document.head.appendChild(sc);
        }
        let cssStr = ':root { ';
        houses.forEach(h => {
          cssStr += `--h-${h.HouseName.toLowerCase().replace(/\s+/g, '-')}:${h.Color || '#888'}; `;
        });
        sc.innerText = cssStr + ' }';

        // Calculate custom metric tallies
        const sortedScores = [...scores].sort((a,b) => Number(b.Points) - Number(a.Points));
        const yearlyHouses = sortedScores.map(s => [s.House, Number(s.Points)]);
        const weeklyHouses = [...yearlyHouses]; // Match overall in Sports Day context

        // 1. Build Slide Carousel array
        const newSlides = [];
        
        // Standard Standings Banner Slides
        newSlides.push({ time: 11000, label: '🏆 Overall Standings', html: flagSlide(yearlyHouses, '🏆 OVERALL STANDINGS', 'annual') });

        // 2. Event Breakdown rising charts
        const eventHousePoints = {};
        results.forEach(r => {
          const eventName = r.EventName || 'General';
          const h = r.House;
          const pts = Number(r.Points) || 0;
          
          if (!eventHousePoints[eventName]) eventHousePoints[eventName] = {};
          eventHousePoints[eventName][h] = (eventHousePoints[eventName][h] || 0) + pts;
        });

        Object.keys(eventHousePoints).forEach(eventName => {
          const aMap = eventHousePoints[eventName] || {};
          const hasPoints = Object.values(aMap).some(v => v > 0);
          if (hasPoints) {
            newSlides.push({ time: 11000, label: `🎽 ${eventName}`, html: buildEventHouseSlide(eventName, aMap, 'annual') });
          }
        });

        // 3. Gold Medals Achievement Poster slides
        results.forEach(r => {
          const isGold = r.Position === '1st' || r.Position === 'Winner';
          const isIndiv = !(r.IsTeam === true || r.IsTeam === 'true' || ['HouseDecoration','MarchPast','Discipline'].includes(r.EventName));
          if (isGold && isIndiv && r.StudentName && r.PhotoUrl) {
            const hColor = houseColor(r.House);
            const thumbUrl = getGoogleDriveThumbUrl(r.PhotoUrl);
            const icon = achIcon(r.EventName);
            const cleanHouse = String(r.House).toUpperCase();
            
            newSlides.push({
              time: 15000,
              label: `${icon} ${r.EventName}`,
              isAchievement: true,
              html: `
                <div class="ach-poster" style="--ach-clr:${hColor};">
                  <div class="ach-spotlight"></div>
                  <div class="ach-poster-rays"></div>
                  <div class="ach-photo-panel">
                    <img src="${thumbUrl}" onerror="this.src='';this.style.background='linear-gradient(135deg,#1a1a2e,#16213e)';" alt="${r.StudentName}">
                    <div class="ach-photo-fade"></div>
                    <div class="ach-corner-logo" style="--ach-clr:${hColor};">
                      <span class="ach-corner-fallback">${r.House.charAt(0).toUpperCase()}</span>
                    </div>
                  </div>
                  <div class="ach-text-panel">
                    <div class="ach-title-row sparkle-in" style="animation-delay:1.0s;">
                      <span class="ach-cat-icon">${icon}</span>
                      <span class="ach-title-text">${r.EventName} Champion</span>
                    </div>
                    <div class="ach-student-name sparkle-in" style="animation-delay:1.8s;">${String(r.StudentName).toUpperCase()}</div>
                    <div class="ach-badge-row sparkle-in" style="animation-delay:3.0s;">
                      <span class="ach-dept-badge">🎓 ${r.Department || 'Sports'}</span>
                      <span class="ach-house-badge" style="background:${hColor};color:#000;">${cleanHouse} HOUSE</span>
                    </div>
                    <div class="ach-quote-wrap sparkle-in" style="animation-delay:3.5s;">
                      <span class="ach-quote-mark">“</span>
                      <span class="ach-quote-text">Victory is sweetest when shared. Contributed a massive +${r.Points} points for ${r.House} house in the ${r.EventName} event!</span>
                    </div>
                  </div>
                  <img class="ach-3d-gif" src="https://media.tenor.com/bCbp9zIMcwYAAAAi/confetti-minion.gif" alt="celebration">
                </div>`
            });
          }
        });

        // 4. Department Toppers slide
        const deptStudents = {};
        results.forEach(r => {
          if (!r.StudentName) return;
          const dept = r.Department || 'General';
          const name = r.StudentName;
          const pts = Number(r.Points) || 0;
          if (!deptStudents[dept]) deptStudents[dept] = {};
          deptStudents[dept][name] = (deptStudents[dept][name] || 0) + pts;
        });

        const toppersList = Object.entries(deptStudents).map(([dept, students]) => {
          const sorted = Object.entries(students).sort((a,b) => b[1]-a[1]);
          return { dept, top3: sorted.slice(0, 3) };
        });

        const medals = ['🥇','🥈','🥉'];
        const topColors = ['#d4af37','#c0c0c0','#cd7f32'];
        for (let di = 0; di < toppersList.length; di += 3) {
          const chunk = toppersList.slice(di, di + 3);
          const cards = chunk.map((d, ci) => {
            const wk = results.find(w => w.Department === d.dept && (w.Position === '1st' || w.Position === 'Winner'));
            const col = topColors[ci] || '#666';
            const topperRows = d.top3.map((s, idx) => `
              <div class="dept-topper-row">
                <span class="dept-topper-medal">${medals[idx]||''}</span>
                <span class="dept-topper-name">${s[0]}</span>
                <span class="dept-topper-pts"><span class="count-up" data-val="${s[1]}">0</span> pts</span>
              </div>`).join('');

            return `
              <div class="dept-card" style="--dc:${col}">
                <div class="dept-card-name">${d.dept}</div>
                <div class="dept-weekly-label">Recent Winner</div>
                <div class="dept-weekly-name">${wk ? wk.StudentName : '—'}</div>
                <div class="dept-topper-list">
                  <div style="font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,215,0,0.5);margin-bottom:4px;">Top Scorers</div>
                  ${topperRows}
                </div>
              </div>`;
          }).join('');

          newSlides.push({
            time: 12000,
            label: '🎓 Department Toppers',
            html: `<div class="dept-slide"><div class="dept-slide-title">⭐ Department Toppers</div><div class="dept-grid">${cards}</div></div>`
          });
        }

        // 5. Active Department & Star Performers (Top 5 students)
        const studentTotals = {};
        results.forEach(r => {
          if (!r.StudentName) return;
          studentTotals[r.StudentName] = (studentTotals[r.StudentName] || 0) + (Number(r.Points) || 0);
        });
        const starPerformers = Object.entries(studentTotals).sort((a,b) => b[1]-a[1]).slice(0, 5);

        const deptTotals = {};
        results.forEach(r => {
          const dept = r.Department || 'General';
          deptTotals[dept] = (deptTotals[dept] || 0) + (Number(r.Points) || 0);
        });
        const activeDept = Object.entries(deptTotals).sort((a, b) => b[1] - a[1])[0]?.[0] || 'N/A';

        const maxPtsVal = starPerformers[0] ? starPerformers[0][1] : 1;
        const medalClasses = ['t-gold','t-silver','t-bronze','t-other','t-other'];
        const ords = ['1','2','3','4','5'];
        const tHtml = starPerformers.map((t, idx) => {
          const pct = Math.round((t[1] / maxPtsVal) * 100);
          const mc = medalClasses[idx] || 'other';
          const rEmoji = medals[idx] || '🏅';
          
          return `
            <div class="teacher-row">
              <div class="teacher-medal ${mc}">${rEmoji}</div>
              <div class="teacher-info">
                <div class="teacher-name">${t[0]}</div>
                <div class="teacher-logs">${t[1]} TOTAL POINTS</div>
              </div>
              <div class="teacher-bar-wrap"><div class="teacher-bar" style="width:${pct}%"></div></div>
            </div>`;
        }).join('');

        newSlides.push({
          time: 11000,
          label: '⚡ Star Performers',
          html: `
            <div class="info-slide">
              <div class="active-dept-card">
                <div class="active-dept-fire">🔥</div>
                <div class="active-dept-label">Most Active Department</div>
                <div class="active-dept-name">${activeDept}</div>
                <div class="active-dept-sub">Standings Peak</div>
              </div>
              <div class="teachers-card">
                <div class="teachers-title">🏆 Top Performing Students</div>
                ${tHtml}
              </div>
            </div>`
        });

        if (newSlides.length === 0) {
          newSlides.push({ time: 5000, html: '<h1>SPORTS DAY</h1><p>Waiting for live scores config...</p>' });
        }
        
        slidesData = newSlides;
        
        // Trigger congratulations overlay if total points increased (Live event update!)
        const totalGlobalPoints = scores.reduce((sum, s) => sum + (Number(s.Points) || 0), 0);
        const lastResult = scoreboardData.lastResult;
        if (lastGlobalPoints !== 0 && totalGlobalPoints > lastGlobalPoints && lastResult) {
          showPopup(lastResult);
        }
        lastGlobalPoints = totalGlobalPoints;

        document.getElementById('ticker').innerText = `GLOBAL: ${totalGlobalPoints} pts | Last sync: ${new Date().toLocaleTimeString()} | Live TV Scoreboard`;

      } catch(e) {
        console.error('refresh error', e);
        document.getElementById('ticker').innerText = 'Data connection issue. Retrying...';
      }
    }

    // ─────────────────────────────────────────────
    //  Slides Carousel Loop
    // ─────────────────────────────────────────────
    let slideFlashTimer = null;
    function flashSlideLabel(label) {
      const el = document.getElementById('slide-flash');
      if (!el || !label) return;
      const tmp = document.createElement('div');
      tmp.innerHTML = label;
      const txt = (tmp.textContent || tmp.innerText || '').trim();
      el.innerText = txt;
      el.classList.add('show');
      clearTimeout(slideFlashTimer);
      slideFlashTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    async function startRotation() {
      const stage = document.getElementById('slide-stage');
      while (true) {
        if (slidesData.length > 0 && !isPopupActive) {
          if (currentSlideIndex >= slidesData.length) currentSlideIndex = 0;
          
          const incoming = document.createElement('div');
          incoming.className = 'slide';
          incoming.innerHTML = slidesData[currentSlideIndex].html;
          stage.appendChild(incoming);
          
          const outgoing = stage.querySelector('.slide.active');
          if (outgoing) {
            outgoing.classList.add('exiting');
            outgoing.classList.remove('active');
          }
          
          await new Promise(r => setTimeout(r, 60));
          incoming.classList.add('active');

          // Odometer count-up animation for numbers
          incoming.querySelectorAll('.count-up').forEach(el => {
            const target = parseInt(el.getAttribute('data-val'), 10) || 0;
            const dur = 1800;
            let start = null;
            function step(ts) {
              if (!start) start = ts;
              const prog = Math.min((ts - start) / dur, 1);
              const ease = 1 - Math.pow(1 - prog, 3); // easeOutCubic
              el.innerText = Math.floor(ease * target).toLocaleString();
              if (prog < 1) window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
          });

          // Rising bar chart animation trigger
          setTimeout(() => {
            incoming.querySelectorAll('.dh-bar').forEach(bar => {
              bar.classList.add('bar-risen');
            });
          }, 200);

          flashSlideLabel(slidesData[currentSlideIndex].label || '');
          
          if (slidesData[currentSlideIndex].isAchievement) {
            setTimeout(() => {
              if (window.confetti) {
                confetti({ particleCount: 200, spread: 130, origin: { y: 0.35 } });
              }
            }, 900);
          }

          if (outgoing) {
            const _out = outgoing;
            setTimeout(() => { if (_out.parentNode) _out.parentNode.removeChild(_out); }, 750);
          }
          
          await new Promise(r => setTimeout(r, slidesData[currentSlideIndex].time));
          currentSlideIndex++;
        } else {
          await new Promise(r => setTimeout(r, 1000));
        }
      }
    }

    // ─────────────────────────────────────────────
    //  Congratulations Full-screen Overlay
    // ─────────────────────────────────────────────
    function showPopup(r) {
      if (!r) return;
      isPopupActive = true;
      const p = document.getElementById('paper-popup');
      try {
        const sfx = document.getElementById('sfx-chime');
        if (sfx) { sfx.currentTime = 0; sfx.play().catch(() => {}); }
        const m = document.getElementById('bgMusic');
        if (m) m.volume = 0.25;
      } catch(e) {}

      document.getElementById('pop-name').innerText = r.StudentName || r.House + ' Team';
      document.getElementById('pop-dept').innerText = r.Department || '';
      document.getElementById('pop-pts').innerText = `+${r.Points}`;
      
      const h = document.getElementById('pop-house');
      h.innerText = `${String(r.House).toUpperCase()} HOUSE`;
      h.style.backgroundColor = houseColor(r.House);

      p.classList.add('show');
      
      // Shower confetti
      if (window.confetti) {
        confetti({ particleCount: 300, spread: 90, origin: { y: 0.6 } });
      }

      setTimeout(() => {
        p.classList.remove('show');
        isPopupActive = false;
        try {
          const m = document.getElementById('bgMusic');
          if (m) m.volume = 0.65;
        } catch(e) {}
      }, 7500);
    }

    // ─────────────────────────────────────────────
    //  Init
    // ─────────────────────────────────────────────
    (async function init() {
      await updateData();
      setInterval(updateData, 8000);
    })();
  </script>
</body>
</html>
