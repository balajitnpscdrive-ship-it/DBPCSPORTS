<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Live Scoreboard – Sports Day</title>
  <meta name="description" content="Live house points scoreboard for Sports Day"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#f59e0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Sports Day"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --accent: hsl(35,90%,55%);
      --accent2: hsl(260,80%,65%);
      --bg: hsl(220,15%,6%);
      --text: hsl(220,20%,92%);
      --text-muted: hsl(220,10%,55%);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }

    /* ── Animated background ─────────────────── */
    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

    /* ── Header ──────────────────────────────── */
    .hdr{
      display:flex;align-items:center;justify-content:space-between;
      padding:1.2rem 2rem;
      background:linear-gradient(180deg,hsla(220,15%,4%,.95) 0%,transparent 100%);
      gap:1rem;flex-wrap:wrap;
    }
    .hdr-logos{display:flex;align-items:center;gap:1rem;}
    .hdr-logos img{height:64px;border-radius:8px;filter:drop-shadow(0 0 12px var(--accent));}
    .hdr-logos img.founder{border-radius:50%;border:3px solid var(--accent);}
    .hdr-title h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(1.5rem,3.5vw,2.6rem);
      letter-spacing:.08em;
      background:linear-gradient(135deg,var(--accent),hsl(50,100%,70%));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1;
    }
    .hdr-title p{color:var(--text-muted);font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;margin-top:.2rem;}
    .hdr-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
    .hdr-right .upd{font-size:.75rem;color:var(--text-muted);}

    .btn{
      display:inline-flex;align-items:center;gap:.4rem;
      padding:.45rem 1rem;border:none;border-radius:8px;
      font-family:'Inter',sans-serif;font-weight:600;font-size:.82rem;
      cursor:pointer;transition:.2s;text-decoration:none;
    }
    .btn-ghost{background:hsla(255,100%,100%,.07);color:var(--text);border:1px solid hsla(255,100%,100%,.1);}
    .btn-ghost:hover{background:hsla(255,100%,100%,.14);}
    .btn-accent{background:var(--accent);color:#000;}
    .btn-accent:hover{background:hsl(35,90%,65%);}

    /* Music bar */
    .music-bar{
      display:none;align-items:center;gap:.75rem;
      padding:.5rem 2rem;
      background:hsla(220,15%,4%,.7);
      border-bottom:1px solid hsla(255,100%,100%,.06);
    }
    .music-bar.show{display:flex;}
    .music-bar .music-icon{font-size:1.2rem;animation:spin 3s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .music-bar .music-label{font-size:.78rem;color:var(--text-muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .music-bar input[type=range]{
      width:90px;accent-color:var(--accent);cursor:pointer;
    }

    /* ── Score section ───────────────────────── */
    .scores-wrap{padding:1.5rem 2rem 1rem;flex:1;}

    /* RANK BANNER for #1 */
    .rank-banner{
      text-align:center;margin-bottom:1.2rem;
      font-family:'Bebas Neue',sans-serif;font-size:clamp(1rem,2vw,1.4rem);
      letter-spacing:.2em;color:var(--accent);opacity:.6;text-transform:uppercase;
    }

    .score-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:1.5rem;
      margin-bottom:2rem;
    }

    .house-card{
      position:relative;border-radius:20px;padding:2rem 1.5rem 1.5rem;
      text-align:center;overflow:hidden;cursor:default;
      transition:transform .4s cubic-bezier(.34,1.56,.64,1), box-shadow .4s;
      animation:cardIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.9)}to{opacity:1;transform:none}}

    .house-card:hover{transform:translateY(-8px) scale(1.02);}

    /* glow blob */
    .house-card .blob{
      position:absolute;width:180%;height:180%;
      top:-40%;left:-40%;
      background:radial-gradient(circle at 50% 50%,var(--hc)33,transparent 65%);
      animation:blobPulse 3s ease-in-out infinite alternate;
      pointer-events:none;
    }
    @keyframes blobPulse{from{transform:scale(.9);opacity:.18}to{transform:scale(1.1);opacity:.32}}

    /* #1 special glow */
    .house-card.rank-1{box-shadow:0 0 60px var(--hc-glow, #f59e0b55), 0 20px 60px hsla(0,0%,0%,.5);}
    .house-card.rank-1 .blob{opacity:.3;}

    /* card border shimmer */
    .house-card::before{
      content:'';position:absolute;inset:0;border-radius:20px;
      background:linear-gradient(135deg,var(--hc)33 0%,transparent 50%,var(--hc)22 100%);
      z-index:0;
    }
    .house-card > *{position:relative;z-index:1;}

    /* Rank badge */
    .rank-badge{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(2.5rem,5vw,3.8rem);
      line-height:1;
      filter:drop-shadow(0 0 12px var(--hc));
      margin-bottom:.3rem;
    }
    .rank-num{
      position:absolute;top:.8rem;right:1rem;
      font-family:'Outfit',sans-serif;font-weight:900;font-size:.75rem;
      background:var(--hc);color:#000;padding:.2rem .55rem;border-radius:99px;
      opacity:.9;
    }

    /* SVG ring */
    .ring-wrap{position:relative;width:110px;height:110px;margin:0 auto .8rem;}
    .ring-wrap svg{transform:rotate(-90deg);}
    .ring-track{fill:none;stroke:hsla(255,100%,100%,.08);stroke-width:8;}
    .ring-fill{
      fill:none;stroke:var(--hc);stroke-width:8;
      stroke-linecap:round;
      stroke-dasharray:283;stroke-dashoffset:283;
      transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1);
      filter:drop-shadow(0 0 6px var(--hc));
    }
    .ring-pts{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
    }
    .ring-pts .num{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(1.6rem,3vw,2.2rem);
      line-height:1;color:var(--text);
    }
    .ring-pts .lbl{font-size:.6rem;letter-spacing:.12em;opacity:.6;text-transform:uppercase;}

    .house-name{
      font-family:'Outfit',sans-serif;font-weight:900;
      font-size:clamp(1.1rem,2vw,1.5rem);
      letter-spacing:.04em;margin-bottom:.3rem;
      text-shadow:0 0 20px var(--hc);
    }
    .house-sub{font-size:.75rem;color:var(--text-muted);letter-spacing:.08em;}

    /* crown for #1 */
    .crown{
      font-size:1.8rem;
      animation:float 2.5s ease-in-out infinite;
      display:block;margin-bottom:.2rem;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* bar section */
    .bars-wrap{
      max-width:980px;margin:0 auto 2rem;
      padding:1.5rem 2rem;
      background:hsla(220,14%,12%,.6);
      border:1px solid hsla(255,100%,100%,.06);
      border-radius:20px;
      backdrop-filter:blur(12px);
    }
    .bars-wrap h3{
      font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;
      margin-bottom:1rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;
    }
    .bar-row{margin-bottom:1rem;}
    .bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;font-size:.85rem;font-weight:600;}
    .bar-track{height:14px;background:hsla(255,100%,100%,.06);border-radius:99px;overflow:hidden;}
    .bar-fill{
      height:100%;border-radius:99px;
      transition:width 1.4s cubic-bezier(.4,0,.2,1);
      position:relative;overflow:hidden;
    }
    .bar-fill::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,hsla(255,100%,100%,.2),transparent);
      animation:shimmer 2s linear infinite;
    }
    @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(200%)}}

    /* recent + chart side by side */
    .bottom-grid{
      max-width:980px;margin:0 auto 2rem;padding:0 2rem;
      display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;
    }
    @media(max-width:700px){.bottom-grid{grid-template-columns:1fr;}}

    .panel{
      background:hsla(220,14%,12%,.6);
      border:1px solid hsla(255,100%,100%,.06);
      border-radius:20px;padding:1.25rem;
      backdrop-filter:blur(12px);
    }
    .panel h3{font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.9rem;}

    /* recent results */
    .result-row{
      display:flex;align-items:center;gap:.75rem;padding:.6rem 0;
      border-bottom:1px solid hsla(255,100%,100%,.05);
      animation:slideRight .4s ease both;
    }
    @keyframes slideRight{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:none}}
    .result-row:last-child{border-bottom:none;}
    .result-pos{
      font-size:.7rem;font-weight:700;padding:.2rem .5rem;border-radius:6px;
      background:hsla(255,100%,100%,.08);white-space:nowrap;
    }
    .result-pos.gold{background:hsla(35,90%,55%,.2);color:hsl(35,90%,65%);}
    .result-pos.silver{background:hsla(260,80%,65%,.2);color:hsl(260,80%,75%);}
    .result-pos.bronze{background:hsla(25,70%,50%,.2);color:hsl(25,70%,65%);}
    .result-info{flex:1;min-width:0;}
    .result-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .result-event{font-size:.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .result-pts{font-family:'Outfit',sans-serif;font-weight:900;font-size:1rem;white-space:nowrap;}

    /* chart */
    #chart-wrap{position:relative;height:180px;}

    /* ── Winner overlay ───────────────────────── */
    .winner-overlay{
      position:fixed;inset:0;z-index:3000;
      background:hsla(220,15%,3%,.85);
      backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;
      transition:opacity .5s;
    }
    .winner-overlay.show{opacity:1;pointer-events:all;}
    .winner-card{
      width:min(480px,94vw);
      border-radius:24px;overflow:hidden;
      box-shadow:0 0 100px hsla(35,90%,55%,.45),0 30px 80px hsla(0,0%,0%,.6);
      animation:cardPop .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardPop{from{transform:scale(.6) translateY(80px);opacity:0}to{transform:none;opacity:1}}
    .winner-photo{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
    .winner-body{
      padding:1.75rem 2rem;
      background:linear-gradient(135deg,hsla(35,90%,15%,.98),hsla(260,80%,15%,.98));
    }
    .winner-badge{
      display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
      background:var(--accent);color:#000;padding:.25rem .75rem;border-radius:99px;margin-bottom:.6rem;
    }
    .winner-name{
      font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3rem);
      letter-spacing:.06em;line-height:1;margin-bottom:.3rem;
    }
    .winner-meta{color:var(--text-muted);font-size:.9rem;margin-bottom:.8rem;}
    .winner-pts-badge{
      font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:900;
      color:var(--accent);
      text-shadow:0 0 20px var(--accent);
    }
    .winner-close{
      position:absolute;top:1rem;right:1.5rem;
      background:hsla(255,100%,100%,.1);border:none;color:var(--text);
      width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:.2s;
    }
    .winner-close:hover{background:hsla(255,100%,100%,.2);}

    /* toast */
    .toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;}
    .toast{background:hsla(220,14%,18%,.95);backdrop-filter:blur(14px);border:1px solid hsla(255,100%,100%,.08);border-radius:10px;padding:.7rem 1.1rem;font-size:.88rem;box-shadow:0 8px 30px hsla(220,15%,3%,.6);animation:toastIn .3s ease both;max-width:300px;}
    .toast.success{border-left:3px solid hsl(140,60%,45%);}
    .toast.error{border-left:3px solid hsl(0,75%,60%);}
    .toast.info{border-left:3px solid var(--accent);}
    @keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
    @keyframes toastOut{from{opacity:1}to{transform:translateX(100%);opacity:0}}

    #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:2999;}

    @media(max-width:600px){
      .hdr{padding:.8rem 1rem;}
      .scores-wrap{padding:1rem;}
      .score-grid{grid-template-columns:1fr 1fr;gap:1rem;}
      .bars-wrap,.bottom-grid{padding:0 1rem;}
      .bars-wrap{padding:1rem;}
    }
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<canvas id="bg-canvas"></canvas>

<div class="page">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logos">
      <img id="hdr-logo" src="" alt="Logo" onerror="this.style.display='none'"/>
      <div class="hdr-title">
        <h1 id="hdr-college">🏆 SPORTS DAY</h1>

      <img id="hdr-founder" class="founder" src="" alt="Founder" onerror="this.style.display='none'"/>

      <span class="upd" id="last-updated"></span>
      <button class="btn btn-ghost" onclick="refresh()">🔄 Refresh</button>

  <!-- Music bar -->

    <span class="music-icon">🎵</span>

    <button class="btn btn-ghost" style="padding:.3rem .7rem;font-size:.75rem" onclick="toggleMusic()">⏸</button>

  <!-- hidden audio element -->
  <audio id="bg-music" loop preload="auto"></audio>

  <!-- Slides Carousel Wrapper -->
  <div class="slides-wrapper" id="slides-wrapper">
  
    <!-- Slide 1: Standings -->
    <div class="slide-section active" id="slide-standings">
      <div class="scores-wrap" style="padding: 1.5rem 0 1rem 0;">
        <div class="rank-banner">🏟️ LIVE STANDINGS</div>
        <div class="score-grid" id="score-grid"></div>
      </div>
      
      <div class="bars-wrap" id="bars-wrap" style="max-width:1100px;margin:0 auto 2rem;padding:1.5rem 2rem;">
        <h3>📊 Points Breakdown</h3>

      </div>
    </div>

    <!-- Slide 2: Podium (Winners & Runners) -->
    <div class="slide-section" id="slide-podium">
      <div class="rank-banner" style="margin-bottom: 1.2rem;">🏆 EVENT WINNERS PODIUM</div>
      <div class="podium-controls">
        <label for="podium-select">Select Event:</label>
        <select id="podium-select" onchange="onPodiumSelectChange(this.value)">
          <option value="">Latest Event</option>
        </select>
      </div>
      <div class="podium-container" id="podium-container"></div>
    </div>

    <!-- Slide 3: Achievements Grid -->
    <div class="slide-section" id="slide-achievements">
      <div class="rank-banner" style="margin-bottom: 1.2rem;">✨ HOUSE SPECIAL ACHIEVEMENTS</div>
      <div class="achievements-grid" id="achievements-grid"></div>
    </div>

  </div>

  <!-- Bottom panels (Comparison & Recent Results) -->
  <div class="bottom-grid" style="margin-top: 1rem;">
    <div class="panel">
      <h3>🎯 Recent Results</h3>
      <div id="recent-list"></div>
    </div>
    <div class="panel">
      <h3>📈 Comparison</h3>
      <div id="chart-wrap"><canvas id="chart-bar"></canvas></div>
    </div>

</div>

<!-- Winner overlay -->
<div class="winner-overlay" id="winner-overlay">
  <button class="winner-close" onclick="closeWinner()">✕</button>
  <div class="winner-card">
    <img id="winner-photo" class="winner-photo" src="" alt="Winner"
         onerror="this.style.background='linear-gradient(135deg,#1a1a2e,#16213e)';this.src='';this.style.minHeight='160px'"/>
    <div class="winner-body">
      <div class="winner-badge" id="w-badge">🥇 1st Place</div>
      <div class="winner-name" id="w-name">Player Name</div>
      <div class="winner-meta" id="w-meta"></div>
      <div class="winner-pts-badge" id="w-pts"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ─────────────────────────────────────────────
//  Particle background
// ─────────────────────────────────────────────
(function initBg() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const N = 80;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function rnd(a,b){ return a + Math.random()*(b-a); }

  function mkParticle() {
    return {
      x: rnd(0,W), y: rnd(0,H),
      r: rnd(1,3.5),
      vx: rnd(-0.3,0.3), vy: rnd(-0.4,-0.1),
      alpha: rnd(0.2,0.7),
      color: Math.random()<.5 ? '245,158,11' : '139,92,246'
    };
  }
  for(let i=0;i<N;i++) particles.push(mkParticle());

  function loop() {
    ctx.clearRect(0,0,W,H);
    for(const p of particles){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy; p.alpha -= 0.001;
      if(p.alpha<=0||p.y<-10) Object.assign(p, mkParticle(), {y:H+10, alpha:rnd(.2,.7)});
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let chartInstance = null;
let lastResultKey = null;
let scores=[], houses=[], results=[];
let musicUrl = '', musicPlaying = false;
let prevPoints = {};  // track point changes for animation
let currentSlide = 0;
let slideTimer = null;
let userSelectedPodiumEvent = '';

// ─────────────────────────────────────────────
//  Web Audio API Synthesizer (Drumroll, Fanfare, Swoosh)
// ─────────────────────────────────────────────
const SFX = {
  ctx: null,
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },
  swoosh() {
    try {
      this.init();
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(150, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.35);
      gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.35);
      osc.start();
      osc.stop(this.ctx.currentTime + 0.35);
    } catch(e) {}
  },
  drumroll(duration = 2.5) {
    try {
      this.init();
      const bufferSize = this.ctx.sampleRate * duration;
      const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        const tremolo = 0.5 + 0.5 * Math.sin(i * 0.005);
        data[i] = (Math.random() * 2 - 1) * tremolo * 0.12;
      }
      const noise = this.ctx.createBufferSource();
      noise.buffer = buffer;
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 350;
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.4, this.ctx.currentTime + duration - 0.2);
      gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(this.ctx.destination);
      noise.start();
      return noise;
    } catch(e) { return null; }
  },
  fanfare() {
    try {
      this.init();
      const now = this.ctx.currentTime;
      const notes = [261.63, 329.63, 392.00, 523.25];
      notes.forEach((freq, idx) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, now + idx * 0.08);
        osc.frequency.linearRampToValueAtTime(freq + 8, now + idx * 0.08 + 0.4);
        osc.frequency.linearRampToValueAtTime(freq - 8, now + idx * 0.08 + 0.8);
        gain.gain.setValueAtTime(0, now + idx * 0.08);
        gain.gain.linearRampToValueAtTime(0.12, now + idx * 0.08 + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 1.6);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now + idx * 0.08);
        osc.stop(now + idx * 0.08 + 1.6);
      });
    } catch(e) {}
  }
};

// ─────────────────────────────────────────────
//  Slides Carousel Management
// ─────────────────────────────────────────────
function startSlideshow() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(nextSlide, 12000);
}

function stopSlideshow() {
  if (slideTimer) clearInterval(slideTimer);
}

function nextSlide() {
  if (document.getElementById('winner-overlay').classList.contains('show')) return;
  const slides = ['slide-standings', 'slide-podium', 'slide-achievements'];
  SFX.swoosh();
  document.getElementById(slides[currentSlide]).classList.remove('active');
  currentSlide = (currentSlide + 1) % slides.length;
  document.getElementById(slides[currentSlide]).classList.add('active');
}

// ─────────────────────────────────────────────
//  Podium Calculation & Rendering
// ─────────────────────────────────────────────
function populatePodiumSelect() {
  const select = document.getElementById('podium-select');
  const previousValue = select.value;
  const eventsWithResults = [...new Set(results.map(r => JSON.stringify({id: r.EventID, name: r.EventName})))].map(s => JSON.parse(s));
  select.innerHTML = '<option value="">Latest Event</option>';
  eventsWithResults.forEach(e => {
    select.innerHTML += `<option value="${e.id}">${e.name}</option>`;
  });
  if (previousValue) select.value = previousValue;
}

function onPodiumSelectChange(eventId) {
  userSelectedPodiumEvent = eventId;
  renderPodium();
}

function renderPodium() {
  const container = document.getElementById('podium-container');
  let targetEventId = userSelectedPodiumEvent;
  if (!targetEventId && results.length) {
    targetEventId = results[results.length - 1].EventID;
  }
  if (!targetEventId) {
    container.innerHTML = '<p class="text-muted" style="text-align:center;padding:5rem 0;width:100%">No event results recorded yet to show on podium.</p>';
    return;
  }
  const eventResults = results.filter(r => r.EventID === targetEventId);
  const eventName = eventResults.length ? eventResults[0].EventName : '';
  const p1 = eventResults.find(r => r.Position === '1st' || r.Position === 'Winner');
  const p2 = eventResults.find(r => r.Position === '2nd' || r.Position === 'RunnerUp');
  const p3 = eventResults.find(r => r.Position === '3rd' || r.Position === 'SecondRunnerUp');
  if (!p1 && !p2 && !p3) {
    container.innerHTML = `<p class="text-muted" style="text-align:center;padding:5rem 0;width:100%">No winners recorded for event: ${eventName}</p>`;
    return;
  }
  const renderStep = (r, rank, rankClass) => {
    if (!r) {
      return `
      <div class="podium-step ${rankClass}">
        <div class="podium-user" style="opacity: 0.3">
          <div class="podium-photo-wrap" style="--hc:#555;--hc-glow:rgba(255,255,255,0.05)">
            <img class="podium-photo" src="" alt="">
          </div>
          <div class="podium-name">-</div>
          <div class="podium-meta">Unassigned</div>
        </div>
        <div class="podium-block"><span class="num">${rank}</span></div>
      </div>`;
    }
    const col = houseColor(r.House);
    const glow = col + '55';
    const photo = r.PhotoUrl ? getGoogleDriveThumbUrl(r.PhotoUrl) : '';
    const name = r.StudentName || r.House + ' Team';
    const dept = r.Department || '';
    return `
    <div class="podium-step ${rankClass}">
      <div class="podium-user">
        <div class="podium-photo-wrap" style="--hc:${col}; --hc-glow:${glow}">
          <img class="podium-photo" src="${photo}" alt="${name}" onerror="this.style.background='linear-gradient(135deg,#1a1a2e,#16213e)';this.src='';this.style.minHeight='100%'">
        </div>
        <div class="podium-name">${name}</div>
        <div class="podium-meta">${r.House}${dept ? ' · ' + dept : ''}</div>
      </div>
      <div class="podium-block"><span class="num">${rank}</span></div>
    </div>`;
  };
  container.innerHTML = `
    <div style="width:100%;text-align:center;margin-top:-1.5rem;font-weight:700;color:var(--accent);font-size:0.95rem;letter-spacing:1px">${eventName.toUpperCase()}</div>
    <div style="display:flex;align-items:flex-end;justify-content:center;gap:1.5rem;width:100%;margin-top:1.5rem">
      ${renderStep(p2, '2', 'pos-2')}
      ${renderStep(p1, '1', 'pos-1')}
      ${renderStep(p3, '3', 'pos-3')}
    </div>
  `;
}

// ─────────────────────────────────────────────
//  Achievements Calculation & Rendering
// ─────────────────────────────────────────────
function renderAchievements() {
  const grid = document.getElementById('achievements-grid');
  if (!scores.length) {
    grid.innerHTML = '<p class="text-muted" style="grid-column:1/-1;text-align:center;padding:5rem 0">No standing data available.</p>';
    return;
  }
  const sorted = [...scores].sort((a, b) => Number(b.Points) - Number(a.Points));
  const leader = sorted[0];
  const leaderCol = houseColor(leader.House);
  const firstsCount = {};
  results.forEach(r => {
    const isGold = r.Position === '1st' || r.Position === 'Winner';
    const isIndiv = !(r.IsTeam === true || r.IsTeam === 'true' || ['HouseDecoration','MarchPast','Discipline'].includes(r.EventName));
    if (isGold && isIndiv && r.House) {
      firstsCount[r.House] = (firstsCount[r.House] || 0) + 1;
    }
  });
  let sweepHouse = '-';
  let sweepCount = 0;
  Object.entries(firstsCount).forEach(([h, count]) => {
    if (count > sweepCount) {
      sweepCount = count;
      sweepHouse = h;
    }
  });
  const mpWinner = results.find(r => r.EventName === 'MarchPast' && (r.Position === 'Winner' || r.Position === '1st'));
  const mpHouseName = mpWinner ? mpWinner.House : 'TBD';
  const decWinner = results.find(r => r.EventName === 'HouseDecoration' && (r.Position === 'Winner' || r.Position === '1st'));
  const decHouseName = decWinner ? decWinner.House : 'TBD';
  let starUser = null;
  for (let i = results.length - 1; i >= 0; i--) {
    const r = results[i];
    const isGold = r.Position === '1st' || r.Position === 'Winner';
    const isIndiv = !(r.IsTeam === true || r.IsTeam === 'true' || ['HouseDecoration','MarchPast','Discipline'].includes(r.EventName));
    if (isGold && isIndiv && r.StudentName) {
      starUser = r;
      break;
    }
  }
  let starHTML = `
    <div class="achieve-card">
      <div class="achieve-icon">⭐</div>
      <div class="achieve-details">
        <div class="achieve-title">Star Performer</div>
        <div class="achieve-name">-</div>
        <div class="achieve-desc">No individual gold recorded yet</div>
      </div>
    </div>`;
  if (starUser) {
    const starPhoto = starUser.PhotoUrl ? getGoogleDriveThumbUrl(starUser.PhotoUrl) : '';
    const starName = starUser.StudentName;
    const starHouse = starUser.House;
    const starEvent = starUser.EventName;
    starHTML = `
      <div class="achieve-card" style="border-color:${houseColor(starHouse)}44">
        <div class="achieve-pic-wrap" style="border-color:${houseColor(starHouse)}">
          <img class="achieve-pic" src="${starPhoto}" alt="${starName}" onerror="this.style.background='linear-gradient(135deg,#1a1a2e,#16213e)';this.src='';">
        </div>
        <div class="achieve-details">
          <div class="achieve-title">Star Performer</div>
          <div class="achieve-name">${starName}</div>
          <div class="achieve-desc">${starHouse} · Gold in ${starEvent}</div>
        </div>
      </div>`;
  }
  grid.innerHTML = `
    <div class="achieve-card" style="border-color:${leaderCol}55">
      <div class="achieve-icon">🏆</div>
      <div class="achieve-details">
        <div class="achieve-title">Overall Leader</div>
        <div class="achieve-name" style="color:${leaderCol}">${leader.House}</div>
        <div class="achieve-desc">Leading with ${leader.Points} total points</div>
      </div>
    </div>
    <div class="achieve-card" style="${sweepHouse !== '-' ? 'border-color:' + houseColor(sweepHouse) + '55' : ''}">
      <div class="achieve-icon">🥇</div>
      <div class="achieve-details">
        <div class="achieve-title">Medal Sweep</div>
        <div class="achieve-name" style="${sweepHouse !== '-' ? 'color:' + houseColor(sweepHouse) : ''}">${sweepHouse}</div>
        <div class="achieve-desc">${sweepCount ? sweepCount + ' individual gold medals won' : 'No individual gold medals yet'}</div>
      </div>
    </div>
    ${starHTML}
    <div class="achieve-card" style="${mpHouseName !== 'TBD' ? 'border-color:' + houseColor(mpHouseName) + '55' : ''}">
      <div class="achieve-icon">🥁</div>
      <div class="achieve-details">
        <div class="achieve-title">March Past Champion</div>
        <div class="achieve-name" style="${mpHouseName !== 'TBD' ? 'color:' + houseColor(mpHouseName) : ''}">${mpHouseName}</div>
        <div class="achieve-desc">${mpHouseName !== 'TBD' ? 'Awarded March Past honors' : 'March Past results pending'}</div>
      </div>
    </div>
    <div class="achieve-card" style="${decHouseName !== 'TBD' ? 'border-color:' + houseColor(decHouseName) + '55' : ''}">
      <div class="achieve-icon">🎨</div>
      <div class="achieve-details">
        <div class="achieve-title">Creative Decoration</div>
        <div class="achieve-name" style="${decHouseName !== 'TBD' ? 'color:' + houseColor(decHouseName) : ''}">${decHouseName}</div>
        <div class="achieve-desc">${decHouseName !== 'TBD' ? 'Winner of House Decoration' : 'Decoration results pending'}</div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
(async function init() {
  await refresh();
  startSlideshow();
  setInterval(refresh, 10_000);
  
  // Audio activation on first click
  const activateAudio = () => {
    SFX.init();
    document.removeEventListener('click', activateAudio);
  };
  document.addEventListener('click', activateAudio);
})();

// ─────────────────────────────────────────────
//  Refresh
// ─────────────────────────────────────────────
async function refresh() {
  try {
    const data = await apiGet('getScoreboard');
    scores  = data.scores  || [];
    houses  = data.houses  || [];
    results = await apiGet('getResults');

    // Branding from scoreboard settings
    const s = data.settings || {};
    if (s.CollegeName) document.getElementById('hdr-college').textContent = '🏆 ' + s.CollegeName.toUpperCase();
    if (s.EventTitle)  document.getElementById('hdr-event').textContent   = s.EventTitle;
    if (s.LogoUrl)     { const el=document.getElementById('hdr-logo');   el.src=getGoogleDriveThumbUrl(s.LogoUrl);   el.style.display='block'; }
    if (s.FounderUrl)  { const el=document.getElementById('hdr-founder'); el.src=getGoogleDriveThumbUrl(s.FounderUrl); el.style.display='block'; }

    // Music
    if (s.MusicUrl && s.MusicUrl !== musicUrl) {
      musicUrl = s.MusicUrl;
      setupMusic(musicUrl);
    }

    renderCards();
    renderBars();
    renderChart();
    renderRecent();
    
    // Refresh podium and achievements slides
    populatePodiumSelect();
    renderPodium();
    renderAchievements();

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    // Winner announcement
    const latest = data.lastResult;
    if (latest && latest.EventID) {
      const key = latest.EventID + '|' + latest.StudentName + '|' + latest.Points;
      if (key !== lastResultKey) {
        lastResultKey = key;
        setTimeout(() => showWinner(latest), 500);
      }
    }
  } catch(e) { console.error('refresh error', e); }
}

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
function houseColor(name) {
  const h = houses.find(h => String(h.HouseName || '').trim().toLowerCase() === String(name || '').trim().toLowerCase());
  return h ? (h.Color || '#f59e0b') : '#f59e0b';
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ─────────────────────────────────────────────
//  Score Cards with SVG rings
// ─────────────────────────────────────────────
function renderCards() {
  const sorted = [...scores].sort((a,b) => Number(b.Points)-Number(a.Points));
  const maxPts = Math.max(...sorted.map(s => Number(s.Points)), 1);
  const rankEmoji = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  const rankCrown = ['👑','🥈','🥉'];

  document.getElementById('score-grid').innerHTML = sorted.map((s, i) => {
    const col   = houseColor(s.House);
    const pts   = Number(s.Points);
    const pct   = pts / maxPts;
    const dash  = 283;
    const offset = dash - (dash * pct);
    const rgb   = tryHexToRgb(col);
    return `
    <div class="house-card rank-${i+1}" style="
        --hc:${col}; --hc-glow:${col}55;
        background:linear-gradient(145deg,${col}18 0%,${col}06 100%);
        border:2px solid ${col}${i===0?'55':'33'};
        animation-delay:${i*0.1}s"
      id="card-${s.House.replace(/\s/g,'_')}">
      <div class="blob"></div>
      <div class="rank-num">#${i+1}</div>
      ${i===0 ? `<span class="crown">👑</span>` : `<div class="rank-badge">${rankEmoji[i]||i+1}</div>`}
      <div class="ring-wrap">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="45"/>
          <circle class="ring-fill" cx="55" cy="55" r="45"
            id="ring-${s.House.replace(/\s/g,'_')}"
            style="stroke:${col};stroke-dashoffset:${offset}"/>
        </svg>
        <div class="ring-pts">
          <span class="num" id="pts-num-${s.House.replace(/\s/g,'_')}">${pts.toLocaleString()}</span>
          <span class="lbl">PTS</span>
        </div>
      </div>
      <div class="house-name" style="color:${col}">${s.House}</div>
      <div class="house-sub">${i===0?'🏆 LEADER':'#' + (i+1) + ' Place'}</div>
    </div>`;
  }).join('');

  // Animate ring offset after render
  requestAnimationFrame(() => {
    sorted.forEach(s => {
      const pts   = Number(s.Points);
      const maxPts = Math.max(...sorted.map(x => Number(x.Points)), 1);
      const pct   = pts / maxPts;
      const el    = document.getElementById('ring-' + s.House.replace(/\s/g,'_'));
      if(el) el.style.strokeDashoffset = String(283 - 283*pct);
    });
  });
}

function tryHexToRgb(hex) {
  try { return hexToRgb(hex); } catch(e){ return '245,158,11'; }
}

// ─────────────────────────────────────────────
//  Bar chart (custom HTML, not Chart.js)
// ─────────────────────────────────────────────
function renderBars() {
  const sorted = [...scores].sort((a,b) => Number(b.Points)-Number(a.Points));
  const max = Math.max(...sorted.map(s => Number(s.Points)), 1);
  document.getElementById('bar-rows').innerHTML = sorted.map((s,i) => {
    const col = houseColor(s.House);
    const pct = (Number(s.Points)/max*100).toFixed(1);
    return `
    <div class="bar-row">
      <div class="bar-label">
        <span style="color:${col};font-weight:700">${s.House}</span>
        <span style="color:${col}">${Number(s.Points).toLocaleString()} pts</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:0%;background:linear-gradient(90deg,${col}99,${col})" data-w="${pct}"></div>
      </div>
    </div>`;
  }).join('');
  // Animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  });
}

// ─────────────────────────────────────────────
//  Chart.js comparison
// ─────────────────────────────────────────────
function renderChart() {
  const sorted = [...scores].sort((a,b) => Number(b.Points)-Number(a.Points));
  const ctx = document.getElementById('chart-bar').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(s => s.House),
      datasets: [{
        data: sorted.map(s => Number(s.Points)),
        backgroundColor: sorted.map(s => houseColor(s.House) + '88'),
        borderColor:     sorted.map(s => houseColor(s.House)),
        borderWidth: 2, borderRadius: 8, borderSkipped: false
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ ticks:{color:'#9ca3af',font:{family:'Inter'}}, grid:{color:'rgba(255,255,255,.04)'} },
        y:{ ticks:{color:'#9ca3af'}, grid:{color:'rgba(255,255,255,.04)'}, beginAtZero:true }
      },
      animation:{ duration:1000, easing:'easeOutQuart' }
    }
  });
}

// ─────────────────────────────────────────────
//  Recent results
// ─────────────────────────────────────────────
function renderRecent() {
  const recent = [...(results||[])].reverse().slice(0, 8);
  const posClass = { '1st':'gold','2nd':'silver','3rd':'bronze' };
  document.getElementById('recent-list').innerHTML = recent.length
    ? recent.map((r,i) => `
      <div class="result-row" style="animation-delay:${i*0.06}s">
        <span class="result-pos ${posClass[r.Position]||''}">${r.Position}</span>
        <div class="result-info">
          <div class="result-name">${r.StudentName}</div>
          <div class="result-event">${r.EventName} · <span style="color:${houseColor(r.House)}">${r.House}</span></div>
        </div>
        <span class="result-pts" style="color:${houseColor(r.House)}">+${r.Points}</span>
      </div>`).join('')
    : '<p style="color:var(--text-muted);font-size:.85rem;text-align:center;padding:1rem 0">No results yet</p>';
}

// ─────────────────────────────────────────────
//  Winner overlay
// ─────────────────────────────────────────────
function showWinner(r) {
  stopSlideshow();
  
  // Play synthesized drumroll
  const drumrollNode = SFX.drumroll(2.2);
  
  const col = houseColor(r.House);
  const posLabel = { '1st':'🥇 1st Place', '2nd':'🥈 2nd Place', '3rd':'🥉 3rd Place', 'Winner':'🥇 Winner', 'RunnerUp':'🥈 Runner Up', 'SecondRunnerUp':'🥉 2nd Runner Up' };
  
  document.getElementById('w-badge').textContent = posLabel[r.Position] || r.Position;
  document.getElementById('w-badge').style.background = col;
  document.getElementById('w-name').textContent  = r.StudentName || r.House + ' Team';
  document.getElementById('w-meta').textContent  = `${r.EventName}  ·  ${r.House}${r.Department ? '  ·  ' + r.Department : ''}`;
  document.getElementById('w-pts').textContent   = '+' + r.Points + ' Points';
  document.getElementById('winner-photo').src    = getGoogleDriveThumbUrl(r.PhotoUrl || '');
  
  // Wait for drumroll to finish before showing card and playing fanfare
  setTimeout(() => {
    document.getElementById('winner-overlay').classList.add('show');
    SFX.fanfare();
    fireConfetti();
  }, 2200);
  
  setTimeout(closeWinner, 11000);
}

function closeWinner() {
  document.getElementById('winner-overlay').classList.remove('show');
  startSlideshow();
}

// ─────────────────────────────────────────────
//  Background music
// ─────────────────────────────────────────────
function setupMusic(url) {
  const audio = document.getElementById('bg-music');
  audio.src = url;
  audio.volume = 0.5;
  document.getElementById('music-toggle-btn').style.display = 'flex';
  document.getElementById('music-bar').classList.add('show');

  // Autoplay on first user interaction
  const tryPlay = () => {
    audio.play().then(() => {
      musicPlaying = true;
      updateMusicBtn();
      document.removeEventListener('click', tryPlay);
      document.removeEventListener('keydown', tryPlay);
    }).catch(() => {});
  };
  // Try immediately, fall back to interaction
  audio.play().then(() => { musicPlaying = true; updateMusicBtn(); }).catch(() => {
    document.addEventListener('click', tryPlay);
    document.addEventListener('keydown', tryPlay);
    toast('🎵 Click anywhere to start music', 'info');
  });
}

function toggleMusic() {
  const audio = document.getElementById('bg-music');
  if (!audio.src || !musicUrl) { toast('No music uploaded yet', 'error'); return; }
  if (musicPlaying) { audio.pause(); musicPlaying = false; }
  else              { audio.play(); musicPlaying = true; }
  updateMusicBtn();
}

function updateMusicBtn() {
  const btn = document.getElementById('music-toggle-btn');
  btn.textContent = musicPlaying ? '⏸ Music' : '▶ Music';
  const barBtn = document.querySelector('.music-bar .btn-ghost');
  if(barBtn) barBtn.textContent = musicPlaying ? '⏸' : '▶';
}

function setVolume(v) {
  document.getElementById('bg-music').volume = parseFloat(v);
}

// ─────────────────────────────────────────────
//  Confetti
// ─────────────────────────────────────────────
function fireConfetti() {
  if (!window.confetti) return;
  const end = Date.now() + 3500;
  const colors = ['#f59e0b','#a78bfa','#34d399','#f87171','#60a5fa','#fbbf24'];
  (function frame() {
    confetti({ particleCount:6, angle:60, spread:60, origin:{x:0}, colors });
    confetti({ particleCount:6, angle:120, spread:60, origin:{x:1}, colors });
    if(Date.now()<end) requestAnimationFrame(frame);
  })();
}

// ─────────────────────────────────────────────
//  Toast
// ─────────────────────────────────────────────
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.animation='toastOut .3s ease both'; t.addEventListener('animationend',()=>t.remove()); }, 3500);
}
</script>
